<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>אפשרות 1 — פאנל מתקפל</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; direction: rtl; min-height: 100vh; padding: 24px; }
  h2 { color: #94a3b8; font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 16px; }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .search-box {
    flex: 1;
    min-width: 180px;
    padding: 9px 14px;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 8px;
    color: #e2e8f0;
    font-size: 0.95rem;
    outline: none;
  }
  .search-box::placeholder { color: #475569; }
  .btn-filter {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 9px 16px;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 8px;
    color: #94a3b8;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-filter.active { border-color: #3b82f6; color: #60a5fa; background: #1e3a5f; }
  .btn-filter:hover { border-color: #475569; color: #e2e8f0; }
  .badge {
    background: #3b82f6;
    color: white;
    border-radius: 999px;
    padding: 1px 7px;
    font-size: 0.72rem;
    font-weight: 700;
  }

  /* Filter panel */
  .filter-panel {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 16px;
    display: none;
    animation: slideDown 0.2s ease;
  }
  .filter-panel.open { display: block; }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .filter-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 14px;
  }
  .filter-group label {
    display: block;
    font-size: 0.75rem;
    color: #64748b;
    margin-bottom: 5px;
    font-weight: 600;
  }
  .filter-group input,
  .filter-group select {
    width: 100%;
    padding: 7px 10px;
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 6px;
    color: #e2e8f0;
    font-size: 0.88rem;
    outline: none;
  }
  .filter-group input:focus,
  .filter-group select:focus { border-color: #3b82f6; }
  .filter-group input::placeholder { color: #475569; }

  .filter-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid #1e293b;
  }
  .btn-clear { padding: 6px 14px; background: transparent; border: 1px solid #334155; border-radius: 6px; color: #94a3b8; cursor: pointer; font-size: 0.85rem; }
  .btn-apply { padding: 6px 14px; background: #3b82f6; border: none; border-radius: 6px; color: white; cursor: pointer; font-size: 0.85rem; font-weight: 600; }

  /* Active filters chips */
  .active-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
  }
  .chip {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px 3px 8px;
    background: #1e3a5f;
    border: 1px solid #3b82f6;
    border-radius: 999px;
    font-size: 0.8rem;
    color: #93c5fd;
  }
  .chip button { background: none; border: none; color: #60a5fa; cursor: pointer; font-size: 0.9rem; line-height: 1; padding: 0 0 0 2px; }

  /* Table */
  .table-wrap { background: #1e293b; border-radius: 12px; border: 1px solid #334155; overflow: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 600px; }
  th { padding: 12px 14px; text-align: right; font-size: 0.78rem; color: #64748b; font-weight: 600; border-bottom: 1px solid #334155; background: #1e293b; }
  td { padding: 11px 14px; font-size: 0.88rem; border-bottom: 1px solid #1e3a5f; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #243447; }
</style>
</head>
<body>

<h2>אפשרות 1 — פאנל פילטרים מתקפל</h2>

<div class="toolbar">
  <input class="search-box" type="text" placeholder="חיפוש חופשי...">
  <button class="btn-filter active" onclick="togglePanel(this)">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
    פילטרים
    <span class="badge">2</span>
  </button>
  <button class="btn-filter" style="margin-right:auto">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    ייצוא
  </button>
  <button class="btn-filter">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    הוסף
  </button>
</div>

<div class="filter-panel open" id="panel">
  <div class="filter-grid">
    <div class="filter-group">
      <label>יצרן</label>
      <input type="text" value="Toyota" placeholder="כל היצרנים">
    </div>
    <div class="filter-group">
      <label>דגם</label>
      <input type="text" placeholder="כל הדגמים">
    </div>
    <div class="filter-group">
      <label>שנה (מ-)</label>
      <input type="number" value="2015" placeholder="מ-">
    </div>
    <div class="filter-group">
      <label>שנה (עד)</label>
      <input type="number" placeholder="עד">
    </div>
    <div class="filter-group">
      <label>ברגים</label>
      <select>
        <option value="">הכל</option>
        <option value="4">4</option>
        <option value="5" selected>5</option>
        <option value="6">6</option>
      </select>
    </div>
    <div class="filter-group">
      <label>PCD (מרווח)</label>
      <input type="number" placeholder="114.3">
    </div>
    <div class="filter-group">
      <label>Center Bore</label>
      <input type="number" placeholder="60.1">
    </div>
    <div class="filter-group">
      <label>חישוק</label>
      <input type="text" placeholder='16"'>
    </div>
  </div>
  <div class="filter-actions">
    <button class="btn-clear">נקה הכל</button>
    <button class="btn-apply">החל פילטרים</button>
  </div>
</div>

<div class="active-chips">
  <div class="chip">יצרן: Toyota <button>×</button></div>
  <div class="chip">ברגים: 5 <button>×</button></div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>יצרן</th><th>דגם</th><th>שנים</th><th>ברגים</th><th>מרווח</th><th>CB</th><th>חישוק</th><th>פעולות</th>
      </tr>
    </thead>
    <tbody>
      <tr><td>Toyota</td><td>Corolla</td><td>2014–2019</td><td>5</td><td>114.3</td><td>60.1</td><td>15, 16</td><td>✏️ 🗑️</td></tr>
      <tr><td>Toyota</td><td>RAV4</td><td>2019–כיום</td><td>5</td><td>114.3</td><td>60.1</td><td>17, 18</td><td>✏️ 🗑️</td></tr>
      <tr><td>Toyota</td><td>Yaris</td><td>2011–2020</td><td>5</td><td>100</td><td>54.1</td><td>15, 16</td><td>✏️ 🗑️</td></tr>
    </tbody>
  </table>
</div>

<script>
function togglePanel(btn) {
  const panel = document.getElementById('panel');
  panel.classList.toggle('open');
  btn.classList.toggle('active');
}
</script>
</body>
</html>
